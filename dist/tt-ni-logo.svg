    <rect x="872" y="527" width="84" height="28" rx="10"/>
    <rect x="998" y="476" width="28" height="143" rx="10"/>
    <path d="M1024 543c0-40 21-68 62-68 40 0 61 25 61 68v62c0 8-6 14-14 14h-1c-8 0-14-6-14-14v-61c0-27-13-42-38-42-27 0-54 22-54 53h-2z"/>
    <rect x="1171" y="478" width="28" height="141" rx="10"/>
