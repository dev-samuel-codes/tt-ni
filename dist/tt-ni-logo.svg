        <circle cx="481" cy="514" r="4.4"/>
        <circle cx="449" cy="529" r="4.4"/>
        <circle cx="465" cy="529" r="4.4"/>
        <circle cx="481" cy="529" r="4.4"/>
        <circle cx="449" cy="544" r="4.4"/>
        <circle cx="465" cy="544" r="4.4"/>
        <circle cx="481" cy="544" r="4.4"/>
      </g>
    </g>
  </g>

  <g fill="#000" filter="url(#textShadow)">
    <rect x="746" y="459" width="29" height="143" rx="10"/>
