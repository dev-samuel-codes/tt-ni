<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1050" viewBox="0 0 1800 1050" role="img" aria-labelledby="title desc">
  <title id="title">tt-ni Icon Based Project Architecture</title>
  <desc id="desc">Icon based architecture diagram for tt-ni showing web client, Vercel, React app, Supabase backend, Edge Functions, OpenAI, Exa.ai, OAuth providers, database, storage, and project scripts.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#15221b" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="canvas" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f8fbf8"/>
      <stop offset="100%" stop-color="#fff9f2"/>
    </linearGradient>
    <linearGradient id="orange3d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff9a3d"/>
      <stop offset="100%" stop-color="#d85a1b"/>
    </linearGradient>
    <linearGradient id="green3d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5ee3a1"/>
      <stop offset="100%" stop-color="#188a57"/>
    </linearGradient>
    <linearGradient id="blue3d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#47b5ff"/>
      <stop offset="100%" stop-color="#116398"/>
    </linearGradient>
    <linearGradient id="gray3d" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8faf9"/>
      <stop offset="100%" stop-color="#cfd7d3"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="11" markerHeight="11" orient="auto">
      <path d="M 1 1 L 11 6 L 1 11 z" fill="#39a461"/>
    </marker>
    <style>
      .title { font: 800 42px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #14231d; letter-spacing: 0; }
      .subtitle { font: 600 20px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5a6b63; letter-spacing: 0; }
      .node-title { font: 800 24px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #182922; letter-spacing: 0; text-anchor: middle; }
      .node-sub { font: 600 15px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #5d6b64; letter-spacing: 0; text-anchor: middle; }
      .edge-label { font: 800 16px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #2e7d4d; letter-spacing: 0; }
      .small { font: 600 14px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #64726c; letter-spacing: 0; }
      .group-title { font: 800 20px "Pretendard", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #20352b; letter-spacing: 0; }
      .node-card { fill: rgba(255,255,255,0.9); stroke: rgba(34,68,52,0.16); stroke-width: 1.5; filter: url(#softShadow); }
      .node-card-green { fill: #f2fbf6; stroke: rgba(36,135,83,0.22); stroke-width: 1.6; filter: url(#softShadow); }
      .node-card-blue { fill: #f1f8ff; stroke: rgba(28,105,160,0.22); stroke-width: 1.6; filter: url(#softShadow); }
      .node-card-orange { fill: #fff5ed; stroke: rgba(202,91,24,0.22); stroke-width: 1.6; filter: url(#softShadow); }
      .connector { fill: none; stroke: #39a461; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .connector-thin { fill: none; stroke: #39a461; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); }
      .connector-dash { fill: none; stroke: #39a461; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 12 13; marker-end: url(#arrow); }
      .icon-line { fill: none; stroke: #20332b; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .icon-line-light { fill: none; stroke: #ffffff; stroke-width: 7; stroke-linecap: round; stroke-linejoin: round; }
      .label-bg { fill: rgba(255,255,255,0.88); stroke: rgba(57,164,97,0.28); stroke-width: 1; }
    </style>
  </defs>

  <rect width="1800" height="1050" fill="url(#canvas)"/>
  <text class="title" x="72" y="78">tt-ni 프로젝트 아키텍처</text>
  <text class="subtitle" x="74" y="112">아이콘 기반 런타임 흐름: React SPA, Vercel, Supabase, Edge Functions, OpenAI, Exa.ai</text>
  <text class="small" x="1430" y="82">현재 저장소 기준</text>
  <text class="small" x="1430" y="106">/Users/samuel/Desktop/Project/tt-ni</text>

  <!-- background zones -->
  <rect x="62" y="150" width="510" height="760" rx="28" fill="#eef8f2" stroke="#d7eadf" stroke-width="2"/>
  <rect x="610" y="150" width="560" height="760" rx="28" fill="#f4faff" stroke="#d9ebfa" stroke-width="2"/>
  <rect x="1210" y="150" width="528" height="760" rx="28" fill="#fff6ee" stroke="#f1ddce" stroke-width="2"/>
  <text class="group-title" x="94" y="192">Client / Delivery</text>
  <text class="group-title" x="642" y="192">Supabase Cloud</text>
  <text class="group-title" x="1242" y="192">External APIs / Operations</text>

  <!-- Node: DNS -->
  <rect class="node-card-orange" x="104" y="248" width="170" height="150" rx="22"/>
  <g transform="translate(189 299)">
    <path d="M-42 36 h84 v30 h-84 z" fill="url(#orange3d)"/>
    <path d="M-42 36 l42 -24 l42 24 l-42 24 z" fill="#ffad5a"/>
    <path d="M0 12 v48" stroke="#c94f18" stroke-width="6"/>
    <path d="M-26 48 h52" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text class="node-title" x="189" y="438">Domain</text>
  <text class="node-sub" x="189" y="465">Route / DNS</text>

  <!-- Node: Web client -->
  <rect class="node-card-green" x="352" y="248" width="178" height="150" rx="22"/>
  <g transform="translate(441 309)">
    <rect x="-45" y="-28" width="90" height="58" rx="8" fill="#24372f"/>
    <rect x="-34" y="-17" width="68" height="36" rx="5" fill="#9ce7bd"/>
    <path d="M-15 52 h30 M0 30 v22" class="icon-line"/>
  </g>
  <text class="node-title" x="441" y="438">Web Client</text>
  <text class="node-sub" x="441" y="465">Browser</text>

  <!-- Node: Vercel -->
  <rect class="node-card" x="174" y="548" width="178" height="156" rx="22"/>
  <g transform="translate(263 607)">
    <path d="M0 -48 L58 52 H-58 Z" fill="#101815"/>
    <path d="M0 -26 L34 34 H-34 Z" fill="#ffffff" opacity="0.18"/>
  </g>
  <text class="node-title" x="263" y="744">Vercel</text>
  <text class="node-sub" x="263" y="771">Static hosting</text>

  <!-- Node: React SPA -->
  <rect class="node-card-green" x="424" y="548" width="178" height="156" rx="22"/>
  <g transform="translate(513 618)">
    <circle cx="0" cy="0" r="12" fill="#42c5d9"/>
    <ellipse cx="0" cy="0" rx="60" ry="23" class="icon-line" stroke="#42c5d9"/>
    <ellipse cx="0" cy="0" rx="60" ry="23" class="icon-line" stroke="#42c5d9" transform="rotate(60)"/>
    <ellipse cx="0" cy="0" rx="60" ry="23" class="icon-line" stroke="#42c5d9" transform="rotate(-60)"/>
  </g>
  <text class="node-title" x="513" y="744">React SPA</text>
  <text class="node-sub" x="513" y="771">App / Pages / Features</text>

  <!-- Supabase Auth -->
  <rect class="node-card-blue" x="650" y="245" width="184" height="150" rx="22"/>
  <g transform="translate(742 305)">
    <path d="M0 -52 L50 -28 V8 C50 42 24 60 0 72 C-24 60 -50 42 -50 8 V-28 Z" fill="url(#blue3d)"/>
    <circle cx="0" cy="-4" r="18" fill="#ffffff"/>
    <path d="M0 14 v26 M-13 40 h26" class="icon-line-light"/>
  </g>
  <text class="node-title" x="742" y="438">Auth</text>
  <text class="node-sub" x="742" y="465">Email / Google / Kakao</text>

  <!-- Supabase DB -->
  <rect class="node-card-blue" x="890" y="245" width="184" height="150" rx="22"/>
  <g transform="translate(982 314)">
    <ellipse cx="0" cy="-48" rx="54" ry="18" fill="#56b5f6"/>
    <path d="M-54 -48 v78 c0 10 24 18 54 18 s54 -8 54 -18 v-78" fill="url(#blue3d)"/>
    <ellipse cx="0" cy="30" rx="54" ry="18" fill="#116398"/>
    <ellipse cx="0" cy="-48" rx="54" ry="18" fill="none" stroke="#083b5d" stroke-width="4"/>
  </g>
  <text class="node-title" x="982" y="438">PostgreSQL</text>
  <text class="node-sub" x="982" y="465">Tables + RLS</text>

  <!-- Supabase Storage -->
  <rect class="node-card-blue" x="890" y="548" width="184" height="156" rx="22"/>
  <g transform="translate(982 612)">
    <path d="M-56 -34 h112 l-12 92 h-88 z" fill="url(#blue3d)"/>
    <path d="M-36 -50 h72 l20 16 h-112 z" fill="#56b5f6"/>
    <rect x="-24" y="-8" width="48" height="38" rx="5" fill="#ffffff" opacity="0.9"/>
    <path d="M-18 22 l14 -14 l11 10 l10 -12 l13 16" fill="none" stroke="#116398" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="node-title" x="982" y="744">Storage</text>
  <text class="node-sub" x="982" y="771">Private labels bucket</text>

  <!-- Edge Functions -->
  <rect class="node-card-blue" x="705" y="530" width="185" height="178" rx="22"/>
  <g transform="translate(798 600)">
    <path d="M0 -64 L58 -31 V34 L0 68 L-58 34 V-31 Z" fill="url(#green3d)"/>
    <path d="M-24 -16 L-46 4 L-24 24 M24 -16 L46 4 L24 24 M9 -28 L-9 36" class="icon-line-light"/>
  </g>
  <text class="node-title" x="798" y="748">Edge Functions</text>
  <text class="node-sub" x="798" y="775">parse, analyze, chat</text>

  <!-- Supabase logo hub -->
  <rect class="node-card-blue" x="742" y="784" width="240" height="78" rx="20"/>
  <g transform="translate(772 823)">
    <path d="M0 -34 L42 -34 L16 4 H0 Z" fill="#39a461"/>
    <path d="M42 34 H0 L26 -4 H42 Z" fill="#2b9b67"/>
  </g>
  <text class="node-title" x="882" y="816">Supabase</text>
  <text class="node-sub" x="882" y="842">BaaS + Deno runtime</text>

  <!-- OpenAI -->
  <rect class="node-card-orange" x="1282" y="245" width="184" height="150" rx="22"/>
  <g transform="translate(1374 308)">
    <circle cx="0" cy="0" r="58" fill="#2f3430"/>
    <path d="M-23 -22 C-8 -48 24 -36 25 -10 C52 -2 38 31 13 24 C-1 50 -35 31 -25 6 C-53 -3 -39 -37 -12 -28 C1 -44 32 -33 20 -5 C42 2 28 30 3 18 C-8 40 -32 18 -17 -4 C-40 -14 -22 -38 -1 -22" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text class="node-title" x="1374" y="438">OpenAI</text>
  <text class="node-sub" x="1374" y="465">Vision / Chat / Refinement</text>

  <!-- Exa -->
  <rect class="node-card-orange" x="1525" y="245" width="184" height="150" rx="22"/>
  <g transform="translate(1617 306)">
    <circle cx="-8" cy="-8" r="45" fill="url(#orange3d)"/>
    <path d="M25 28 L62 65" class="icon-line"/>
    <circle cx="-8" cy="-8" r="25" fill="#ffffff" opacity="0.85"/>
    <path d="M-24 -8 h32 M4 -24 v32 M-2 14 h22" stroke="#d85a1b" stroke-width="6" stroke-linecap="round"/>
  </g>
  <text class="node-title" x="1617" y="438">Exa.ai</text>
  <text class="node-sub" x="1617" y="465">Product search</text>

  <!-- OAuth -->
  <rect class="node-card-orange" x="1282" y="548" width="184" height="156" rx="22"/>
  <g transform="translate(1374 614)">
    <circle cx="-24" cy="0" r="34" fill="#f04438"/>
    <circle cx="28" cy="0" r="34" fill="#f9d84a"/>
    <path d="M-36 -5 h24 M-24 -17 v24 M15 -3 C20 -20 45 -15 45 3 C45 22 14 24 13 2" class="icon-line"/>
  </g>
  <text class="node-title" x="1374" y="744">OAuth</text>
  <text class="node-sub" x="1374" y="771">Google / Kakao</text>

  <!-- Secrets -->
  <rect class="node-card-orange" x="1525" y="548" width="184" height="156" rx="22"/>
  <g transform="translate(1617 614)">
    <rect x="-48" y="-40" width="96" height="82" rx="16" fill="url(#orange3d)"/>
    <path d="M-24 -40 v-14 c0 -20 48 -20 48 0 v14" class="icon-line"/>
    <circle cx="0" cy="0" r="11" fill="#ffffff"/>
    <path d="M0 11 v20" class="icon-line-light"/>
  </g>
  <text class="node-title" x="1617" y="744">Secrets</text>
  <text class="node-sub" x="1617" y="771">OpenAI / Exa / Service Key</text>

  <!-- CI scripts -->
  <rect class="node-card" x="1282" y="788" width="427" height="74" rx="20"/>
  <g transform="translate(1326 825)">
    <circle cx="0" cy="0" r="28" fill="url(#gray3d)" stroke="#75857d" stroke-width="4"/>
    <path d="M0 -16 v32 M-16 0 h32 M-11 -11 l22 22 M11 -11 l-22 22" stroke="#41524a" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text class="node-title" x="1518" y="817">Deploy / Verify Scripts</text>
  <text class="node-sub" x="1518" y="843">predeploy, postdeploy, audit, remote smoke</text>

  <!-- Connectors -->
  <path class="connector" d="M274 323 H352"/>
  <rect class="label-bg" x="296" y="285" width="105" height="28" rx="14"/>
  <text class="edge-label" x="309" y="305">도메인 접속</text>

  <path class="connector" d="M441 398 C441 492 263 492 263 548"/>
  <rect class="label-bg" x="311" y="473" width="126" height="28" rx="14"/>
  <text class="edge-label" x="326" y="493">정적 자산 로드</text>

  <path class="connector" d="M352 626 H424"/>
  <text class="edge-label" x="365" y="611">HTML / JS</text>

  <path class="connector" d="M602 626 H705"/>
  <rect class="label-bg" x="618" y="588" width="128" height="28" rx="14"/>
  <text class="edge-label" x="633" y="608">functions.invoke</text>

  <path class="connector-thin" d="M602 596 C642 596 642 338 650 338"/>
  <text class="edge-label" x="610" y="360">Auth API</text>

  <path class="connector-thin" d="M602 652 C690 652 690 330 890 330"/>
  <text class="edge-label" x="674" y="323">DB API</text>

  <path class="connector-thin" d="M602 684 C702 684 744 626 890 626"/>
  <text class="edge-label" x="716" y="671">Storage API</text>

  <path class="connector-thin" d="M838 708 C838 742 828 762 806 784"/>
  <path class="connector-thin" d="M890 618 C980 618 1070 542 1070 395"/>
  <path class="connector-thin" d="M890 612 C920 612 935 612 890 612"/>

  <path class="connector" d="M890 596 C1058 596 1130 330 1282 330"/>
  <rect class="label-bg" x="1094" y="386" width="74" height="28" rx="14"/>
  <text class="edge-label" x="1108" y="406">AI 처리</text>

  <path class="connector" d="M890 646 C1098 646 1320 344 1525 344"/>
  <rect class="label-bg" x="1152" y="579" width="58" height="28" rx="14"/>
  <text class="edge-label" x="1165" y="599">검색</text>

  <path class="connector-dash" d="M742 245 C742 216 1374 216 1374 548"/>
  <rect class="label-bg" x="1066" y="203" width="92" height="28" rx="14"/>
  <text class="edge-label" x="1080" y="223">소셜 로그인</text>

  <path class="connector-dash" d="M1525 626 C1370 726 1120 746 890 650"/>
  <rect class="label-bg" x="1190" y="710" width="92" height="28" rx="14"/>
  <text class="edge-label" x="1204" y="730">서버 전용 키</text>

  <path class="connector-dash" d="M1282 825 C1125 825 1010 802 982 704"/>
  <rect class="label-bg" x="1110" y="800" width="92" height="28" rx="14"/>
  <text class="edge-label" x="1124" y="820">배포 / 검증</text>

  <!-- Runtime flow footer -->
  <rect x="92" y="938" width="1616" height="76" rx="22" fill="#ffffff" stroke="#dfe9e3" stroke-width="2" filter="url(#softShadow)"/>
  <text class="small" x="124" y="970">주요 흐름</text>
  <text class="small" x="226" y="970">1. 브라우저가 Vercel 정적 앱 로드</text>
  <text class="small" x="524" y="970">2. React SPA가 Supabase Auth/DB/Storage/Functions 호출</text>
  <text class="small" x="952" y="970">3. Edge Functions가 OpenAI/Exa.ai와 통신</text>
  <text class="small" x="1288" y="970">4. 분석/스케줄/채팅 결과를 DB와 UI에 반영</text>
</svg>
